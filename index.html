<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | First Chat</title>
</head>
<body>
    <h1>Wellcome to First chat</h1>
    <form class="fff">
        <div class="child">
        <label for="fn" name="first-name">First Name: </label>
        <br>
        <input id="fn" type="text">
        <div class="fn-valid"> 
        </div>
        </div>

        <div class="child">
            <label for="ln">Last Name: </label>
            <br>
            <input type="text" id="ln" name="last-name">
            <div class="ln-valid">
            </div>
        </div>

        <div class="child">
            <label for="BD">Birth Date: </label>
            <br> 
            <input id="BD" type="text" name="birth-date">
            <div class="bd-valid">
            </div>
        </div>

        <div class="child">
            <label for="email">Email: </label>
            <input id="email" type="email" name="email">
            <div class="em-valid">
            </div>
        </div>

        <div class="child">
            <label for="phone">Phone: </label>
            <input id="phone" type="text" name="phone">
            <div class="phone-valid">
            </div>
        </div>

        <div class="pass">
            <div>
                <label for="passwrod" >Password: </label>
                <br>
                <input id="passwrod" type="password" name="pass">
                <div class="ps-valid">
                </div>
            </div>

            <div>
                <label for="con-password" name="pass-con">Confirm Password: </label>
                <br>
                <input id="con-password" type="password">
                <div class="psc-valid">
                </div>
            </div>

        </div>
        <div>
            <button type="submit" onclick="sub()">Submit</button>
        </div>
        <br>
        <span style="text-align: center;">Do you have Acoount? <a style="color: rgb(25, 135, 84);" href="index-log.html">Login</a></span>
    </form>
    <script src="app2.js"></script>
</body>
</html>
